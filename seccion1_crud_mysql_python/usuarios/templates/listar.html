<!DOCTYPE html>
<html>
<head>
    <title>Lista de Usuarios</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        .btn { display: inline-block; padding: 5px 10px; text-decoration: none; margin: 2px; }
        .btn-nuevo { background-color: #4CAF50; color: white; padding: 10px; }
        .btn-editar { background-color: #ff9800; color: white; }
        .btn-eliminar { background-color: #f44336; color: white; }
    </style>
</head>
<body>
    <h1>Gestión de Usuarios</h1>
    <a href="/crear/" class="btn btn-nuevo">+ Nuevo Usuario</a>
    
     <table>
        <thead>
             <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Fecha</th>
                <th>Acciones</th>
             </tr>
        </thead>
        <tbody>
            {% for usuario in usuarios %}
             <tr>
                <td>{{ usuario.id }}</td>
                <td>{{ usuario.nombre }}</td>
                <td>{{ usuario.email }}</td>
                <td>{{ usuario.fecha_creacion|date:"d/m/Y H:i:s" }}</td>
                <td>
                    <a href="/editar/{{ usuario.id }}/" class="btn btn-editar">Editar</a>
                    <a href="/eliminar/{{ usuario.id }}/" class="btn btn-eliminar">Eliminar</a>
                </td>
             </tr>
            {% empty %}
             <tr>
                <td colspan="5">No hay usuarios registrados</td>
             </tr>
            {% endfor %}
        </tbody>
     </table>
</body>
</html>
