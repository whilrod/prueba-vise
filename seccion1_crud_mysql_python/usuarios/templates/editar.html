<!DOCTYPE html>
<html>
<head>
    <title>Editar Usuario</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        form { width: 400px; margin-top: 20px; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ddd; }
        button { background-color: #ff9800; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        .cancelar { background-color: #f44336; text-decoration: none; padding: 10px 20px; color: white; display: inline-block; }
    </style>
</head>
<body>
    <h1>Editar Usuario</h1>
    <form method="POST">
        {% csrf_token %}
        <label>Nombre:</label>
        <input type="text" name="nombre" value="{{ usuario.nombre }}" required>
        
        <label>Email:</label>
        <input type="email" name="email" value="{{ usuario.email }}" required>
        
        <button type="submit">Actualizar</button>
        <a href="/" class="cancelar">Cancelar</a>
    </form>
</body>
</html>
